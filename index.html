<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMINA</title>
<style>
body{margin:0;background:#1a1a1a;overflow:hidden;}
canvas{display:block;margin:0 auto;background:#3a3a3a;}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=400;
canvas.height=600;

let player={x:80,y:450};
let flowers=[];

function drawBackground(){
let g=ctx.createLinearGradient(0,0,0,600);
g.addColorStop(0,"#6e6e6e");
g.addColorStop(1,"#b7b7b7");
ctx.fillStyle=g;
ctx.fillRect(0,0,400,600);
}

function drawPlayer(){
ctx.beginPath();
ctx.arc(player.x,player.y,15,0,Math.PI*2);
ctx.fillStyle="#e8e8e8";
ctx.fill();

//ブースター
ctx.fillStyle="#88ccff";
ctx.fillRect(player.x-5,player.y+10,10,10);
}

function drawLight(){
ctx.beginPath();
ctx.moveTo(player.x,player.y);
ctx.arc(player.x,player.y,120,-0.5,0.5);
ctx.closePath();
ctx.fillStyle="rgba(255,240,180,0.25)";
ctx.fill();
}

function spawnFlower(x,y){
flowers.push({x,y,size:0});
}

function updateFlowers(){
flowers.forEach(f=>{
f.size+=0.3;
ctx.beginPath();
ctx.arc(f.x,f.y,f.size,0,Math.PI*2);
ctx.fillStyle="#ffd1dc";
ctx.fill();
});
}

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
spawnFlower(t.clientX,t.clientY);
});

function loop(){
drawBackground();
drawLight();
drawPlayer();
updateFlowers();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
